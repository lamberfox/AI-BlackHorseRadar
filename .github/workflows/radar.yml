name: GitHub 黑马雷达

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:
  push:
    branches: [analyzer]
    paths:
      - 'src/**'
      - '顾问.md'
      - 'requirements.txt'

permissions:
  contents: write   # needed to push docs/ to GitHub Pages

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.DEEPSEEK_API_KEY }}"
          echo "::add-mask::${{ secrets.WECOM_WEBHOOK_URL }}"

      - name: Run radar
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/main.py

      - name: Publish report to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "report: $(date -u +%Y-%m-%d) daily radar"
          git push
